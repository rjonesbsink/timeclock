sonar.projectKey=rjonesbsink_timeclock
sonar.organization=rjonesbsink

# Third-party dependencies and test fixtures are excluded from analysis.
# Test code routinely uses patterns (hardcoded IPs, weak legacy-hash
# comparisons for backward-compat testing, a reusable dynamic require()
# helper) that are legitimate security concerns in production code but
# not in test-only context, and shouldn't count against the project's
# Security/Reliability ratings.
sonar.exclusions=vendor/**,tests/**
